name: Daily Product Data (16:00 BJT)

on:
  schedule:
    # Off-peak minutes + backup fire. product-api dedups by game|date, so a
    # duplicate run skips already-imported rows.
    - cron: '13 8 * * *'   # 16:13 BJT
    - cron: '43 8 * * *'   # 16:43 BJT (backup)
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Override date YYYY-MM-DD (default: yesterday; ignored if start_date set)'
        required: false
      start_date:
        description: 'Range start YYYY-MM-DD (for historical backfill)'
        required: false
      end_date:
        description: 'Range end YYYY-MM-DD (for historical backfill; default: yesterday)'
        required: false

concurrency:
  group: daily-product
  cancel-in-progress: false

jobs:
  product-data:
    name: TT产品数据 (Developer Portal)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - name: Run product-api (retry on login timeout)
        env:
          TIKTOK_EMAIL:      ${{ secrets.TIKTOK_EMAIL }}
          TIKTOK_PASSWORD:   ${{ secrets.TIKTOK_PASSWORD }}
          FEISHU_APP_ID:     ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WEBHOOK:    ${{ secrets.FEISHU_WEBHOOK }}
          TARGET_DATE:       ${{ github.event.inputs.target_date }}
          START_DATE:        ${{ github.event.inputs.start_date }}
          END_DATE:          ${{ github.event.inputs.end_date }}
        run: |
          # 手动指定日期范围(历史补录):START_DATE/END_DATE 优先;否则平日回看3天/周日31天
          if [ -n "$START_DATE" ]; then
            export END_DATE="${END_DATE:-$(date -u -d '-1 day' +%F)}"
            echo "backfill range: $START_DATE ~ $END_DATE"
          else
            DAYS=3; [ "$(date -u +%u)" = "7" ] && DAYS=31
            export DAYS
            echo "DAYS=$DAYS"
          fi
          for i in 1 2 3; do
            echo "=== product-api attempt $i ==="
            if npm run product-api; then exit 0; fi
            echo "attempt $i failed (likely TikTok login timeout); retrying in 30s..."
            sleep 30
          done
          echo "all attempts failed"; exit 1

      - name: Audit 产品数据缺口(近14天)
        continue-on-error: true
        env:
          FEISHU_APP_ID:     ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WEBHOOK:    ${{ secrets.FEISHU_WEBHOOK }}
        run: npm run audit-product

      # 导入完成后立即同步多维表(产品侧:经营概览/日报等)
      - name: Sync Base (多维表)
        continue-on-error: true
        env:
          FEISHU_APP_ID:     ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: node src/sync-base.js chanpin

      - name: Upload debug screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: login-debug
          path: data/*.png
          if-no-files-found: ignore

      - name: Notify failure to Feishu
        if: failure()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          [ -z "$FEISHU_WEBHOOK" ] && echo "no FEISHU_WEBHOOK configured, skip" && exit 0
          BJT=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "$FEISHU_WEBHOOK" -H 'Content-Type: application/json' \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"🔴 产品数据·核心抓取/导入失败 ($BJT BJT)\n$URL\"}}"
