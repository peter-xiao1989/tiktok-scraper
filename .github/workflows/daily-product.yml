name: Daily Product Data (16:00 BJT)

on:
  schedule:
    # Off-peak minutes + backup fire. product-api dedups by game|date, so a
    # duplicate run skips already-imported rows.
    - cron: '13 8 * * *'   # 16:13 BJT
    - cron: '43 8 * * *'   # 16:43 BJT (backup)
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Override date YYYY-MM-DD (default: yesterday)'
        required: false

concurrency:
  group: daily-product
  cancel-in-progress: false

jobs:
  product-data:
    name: TT产品数据 (Developer Portal)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - name: Run product-api (retry on login timeout)
        env:
          TIKTOK_EMAIL:      ${{ secrets.TIKTOK_EMAIL }}
          TIKTOK_PASSWORD:   ${{ secrets.TIKTOK_PASSWORD }}
          FEISHU_APP_ID:     ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          TARGET_DATE:       ${{ github.event.inputs.target_date }}
          DAYS: '1'
        run: |
          for i in 1 2 3; do
            echo "=== product-api attempt $i ==="
            if npm run product-api; then exit 0; fi
            echo "attempt $i failed (likely TikTok login timeout); retrying in 30s..."
            sleep 30
          done
          echo "all attempts failed"; exit 1

      - name: Upload debug screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: login-debug
          path: data/*.png
          if-no-files-found: ignore

      - name: Notify failure to Feishu
        if: failure()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          [ -z "$FEISHU_WEBHOOK" ] && echo "no FEISHU_WEBHOOK configured, skip" && exit 0
          BJT=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "$FEISHU_WEBHOOK" -H 'Content-Type: application/json' \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"❌ 产品数据(16点)抓取失败\n时间: $BJT BJT\n查看: $URL\"}}"
