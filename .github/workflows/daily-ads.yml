name: Daily Ad Data (07:00 BJT)

on:
  schedule:
    # Off-peak minutes (avoid :00 global congestion) + a backup fire. ads-api
    # dedups by account|date, so a duplicate run is harmless.
    - cron: '17 23 * * *'   # 07:17 BJT
    - cron: '47 23 * * *'   # 07:47 BJT (backup)
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Override date YYYY-MM-DD (default: per-account yesterday)'
        required: false

concurrency:
  group: daily-ads
  cancel-in-progress: false

jobs:
  ad-data:
    name: TT广告数据 (Marketing API)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run ads-api
        env:
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_APP_ID:       ${{ secrets.TIKTOK_APP_ID }}
          TIKTOK_APP_SECRET:   ${{ secrets.TIKTOK_APP_SECRET }}
          TIKTOK_BC_ID:        ${{ secrets.TIKTOK_BC_ID }}
          FEISHU_APP_ID:       ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET:   ${{ secrets.FEISHU_APP_SECRET }}
          TARGET_DATE:         ${{ github.event.inputs.target_date }}
        run: npm run ads-api
