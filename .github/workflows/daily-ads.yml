name: Daily Ad Data (07:00 BJT)

on:
  schedule:
    - cron: '17 23 * * *'   # 07:17 BJT
    - cron: '47 23 * * *'   # 07:47 BJT (backup: dedup makes duplicate run no-op)
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Override date YYYY-MM-DD (default: per-account yesterday)'
        required: false

concurrency:
  group: daily-ads
  cancel-in-progress: false

jobs:
  # Job 1: 拉取投放数据 + 重算衍生表 + 对账。独立超时 90 分钟。
  # ads-api 读写 9000+ 行约需 60-70 分钟,与 sync-bitable 分开后各有独立计时,
  # 不会再出现"ads-api 跑太久把 sync-bitable 挤掉"的问题。
  ads-pull:
    name: TT广告数据 (Marketing API)
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Run ads-api
        env:
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_APP_ID:       ${{ secrets.TIKTOK_APP_ID }}
          TIKTOK_APP_SECRET:   ${{ secrets.TIKTOK_APP_SECRET }}
          TIKTOK_BC_ID:        ${{ secrets.TIKTOK_BC_ID }}
          FEISHU_APP_ID:       ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET:   ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WEBHOOK:      ${{ secrets.FEISHU_WEBHOOK }}
          TARGET_DATE:         ${{ github.event.inputs.target_date }}
        run: |
          # 永久自愈:无手动指定日期时,平日回看7天、周日回看30天。
          # dedup 在请求前跳过已导入的账户日 → 只有缺失的才真正拉取(成本≈0),
          # run 失败/账户晚授权/新账户历史 都会被后续天数自动补回。
          if [ -z "$TARGET_DATE" ]; then
            # 用北京时间算日期:07:17 BJT = 23:17 UTC 前一天,若用 UTC -1day 会少一天
            DAYS_BACK=7; [ "$(TZ=Asia/Shanghai date +%u)" = "7" ] && DAYS_BACK=30
            export START_DATE=$(TZ=Asia/Shanghai date -d "-$DAYS_BACK days" +%F)
            export END_DATE=$(TZ=Asia/Shanghai date -d "-1 day" +%F)
            echo "self-heal window: $START_DATE ~ $END_DATE"
          fi
          npm run ads-api

      # 对账:API 账户级总量 vs 表内合计,差异>$1 → 自动修复(删残行重拉复核),
      # 修不回的才飞书告警。根治"部分导入日被 dedup 永久跳过"。
      - name: Audit (对账核数 + 自动修复)
        continue-on-error: true
        env:
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_APP_ID:       ${{ secrets.TIKTOK_APP_ID }}
          TIKTOK_APP_SECRET:   ${{ secrets.TIKTOK_APP_SECRET }}
          TIKTOK_BC_ID:        ${{ secrets.TIKTOK_BC_ID }}
          FEISHU_APP_ID:       ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET:   ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WEBHOOK:      ${{ secrets.FEISHU_WEBHOOK }}
          AUDIT_DAYS: '30'
          AUTO_REPAIR: '1'
        run: node src/audit-ads.js

      - name: Notify failure to Feishu
        if: failure()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          [ -z "$FEISHU_WEBHOOK" ] && echo "no FEISHU_WEBHOOK configured, skip" && exit 0
          BJT=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "$FEISHU_WEBHOOK" -H 'Content-Type: application/json' \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"🔴 投放数据·拉取/对账失败 ($BJT BJT)\n$URL\"}}"

  # Job 2: 同步多维表。需要 ads-pull 成功后才启动,有独立 60 分钟超时。
  # 与 ads-pull 完全解耦 — ads-pull 无论跑多久,sync-bitable 都有完整的 60 分钟。
  sync-bitable:
    name: 同步多维表
    needs: ads-pull
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Sync Base (多维表)
        env:
          FEISHU_APP_ID:     ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          node src/sync-base.js toufang
          node src/sync-base.js chanpin

      - name: Notify failure to Feishu
        if: failure()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          [ -z "$FEISHU_WEBHOOK" ] && echo "no FEISHU_WEBHOOK configured, skip" && exit 0
          BJT=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "$FEISHU_WEBHOOK" -H 'Content-Type: application/json' \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"🔴 多维表同步失败 ($BJT BJT)\n$URL\"}}"

  # Job 3: 投放日报推送(需 sync-bitable 完成后才有最新数据)
  notify:
    name: 投放日报推送
    needs: sync-bitable
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: 推送投放日报到飞书群
        continue-on-error: true
        env:
          FEISHU_APP_ID:              ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET:          ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WEBHOOK:             ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_WEBHOOK_ZHANCHE:     ${{ secrets.FEISHU_WEBHOOK_ZHANCHE }}
          FEISHU_WEBHOOK_CHILUN:      ${{ secrets.FEISHU_WEBHOOK_CHILUN }}
          FEISHU_WEBHOOK_TANCHISHE:   ${{ secrets.FEISHU_WEBHOOK_TANCHISHE }}
        run: node src/notify-daily.js
