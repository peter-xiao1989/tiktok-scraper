name: Daily Ad Data (07:00 BJT)

on:
  schedule:
    # Off-peak minutes (avoid :00 global congestion) + a backup fire. ads-api
    # dedups by account|date, so a duplicate run is harmless.
    - cron: '17 23 * * *'   # 07:17 BJT
    - cron: '47 23 * * *'   # 07:47 BJT (backup)
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Override date YYYY-MM-DD (default: per-account yesterday)'
        required: false

concurrency:
  group: daily-ads
  cancel-in-progress: false

jobs:
  ad-data:
    name: TT广告数据 (Marketing API)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run ads-api
        env:
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_APP_ID:       ${{ secrets.TIKTOK_APP_ID }}
          TIKTOK_APP_SECRET:   ${{ secrets.TIKTOK_APP_SECRET }}
          TIKTOK_BC_ID:        ${{ secrets.TIKTOK_BC_ID }}
          FEISHU_APP_ID:       ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET:   ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WEBHOOK:      ${{ secrets.FEISHU_WEBHOOK }}
          TARGET_DATE:         ${{ github.event.inputs.target_date }}
        run: |
          # 永久自愈:无手动指定日期时,平日回看7天、周日回看30天。
          # dedup 在请求前跳过已导入的账户日 → 只有缺失的才真正拉取(成本≈0),
          # run 失败/账户晚授权/新账户历史 都会被后续天数自动补回。
          if [ -z "$TARGET_DATE" ]; then
            DAYS_BACK=7; [ "$(date -u +%u)" = "7" ] && DAYS_BACK=30
            export START_DATE=$(date -u -d "-$DAYS_BACK days" +%F)
            export END_DATE=$(date -u -d "-1 day" +%F)
            echo "self-heal window: $START_DATE ~ $END_DATE"
          fi
          npm run ads-api

      # 对账:API 账户级总量 vs 表内合计,差异>$1 飞书告警(自愈补不回的当天发现)
      - name: Audit (对账核数)
        continue-on-error: true
        env:
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_APP_ID:       ${{ secrets.TIKTOK_APP_ID }}
          TIKTOK_APP_SECRET:   ${{ secrets.TIKTOK_APP_SECRET }}
          TIKTOK_BC_ID:        ${{ secrets.TIKTOK_BC_ID }}
          FEISHU_APP_ID:       ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET:   ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WEBHOOK:      ${{ secrets.FEISHU_WEBHOOK }}
        run: node src/audit-ads.js

      # 导入完成后立即同步多维表(串联保证时序:数据先落地,同步在后)
      - name: Sync Base (多维表)
        continue-on-error: true
        env:
          FEISHU_APP_ID:     ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          node src/sync-base.js toufang
          node src/sync-base.js chanpin

      - name: Notify failure to Feishu
        if: failure()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          [ -z "$FEISHU_WEBHOOK" ] && echo "no FEISHU_WEBHOOK configured, skip" && exit 0
          BJT=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "$FEISHU_WEBHOOK" -H 'Content-Type: application/json' \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"🔴 投放数据·核心抓取/导入失败 ($BJT BJT)\n$URL\"}}"
