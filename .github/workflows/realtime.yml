name: Realtime Ad Data (hourly via worker)

on:
  schedule:
    # Backup only. The Cloudflare worker triggers realtime hourly on the hour
    # (punctual); this is a low-frequency fallback (every 2h at :10) for when
    # the worker is down. Full refresh is idempotent, so an overlapping/missed
    # fire is harmless — this just caps the gap at ~2h without the worker.
    - cron: '10 */2 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Override date YYYY-MM-DD (default: today per account timezone)'
        required: false

# Serialize runs so overlapping fires don't clear each other mid-refresh.
concurrency:
  group: realtime
  cancel-in-progress: false

jobs:
  realtime:
    name: 每日实时投放数据
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch & refresh realtime data
        id: fetch
        env:
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_APP_ID:       ${{ secrets.TIKTOK_APP_ID }}
          TIKTOK_APP_SECRET:   ${{ secrets.TIKTOK_APP_SECRET }}
          TIKTOK_BC_ID:        ${{ secrets.TIKTOK_BC_ID }}
          FEISHU_APP_ID:       ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET:   ${{ secrets.FEISHU_APP_SECRET }}
          TARGET_DATE:         ${{ github.event.inputs.target_date }}
        run: npm run ads-realtime

      - name: Setup lark-cli
        run: |
          npm install -g @larksuite/cli
          echo "${{ secrets.FEISHU_APP_SECRET }}" | lark-cli config init \
            --app-id "${{ secrets.FEISHU_APP_ID }}" \
            --app-secret-stdin \
            --brand feishu

      - name: Rebuild 分时同步数据汇总
        id: fenshi
        continue-on-error: true   # 一张下游表失败不挡其他表,最后统一汇报
        env:
          LARK_AS_BOT: "1"
        run: python3 rebuild_fenshi_summary.py

      - name: Rebuild 分时素材效果表
        id: sucai
        continue-on-error: true
        env:
          LARK_AS_BOT: "1"
        run: python3 rebuild_sucai_effect.py

      - name: Sync 分时表到多维表
        id: sync
        continue-on-error: true
        env:
          LARK_AS_BOT: "1"
        run: python3 sheets_to_base.py fenshi

      # 发群暂停(等报告样式优化后恢复):删除下方 if 即恢复发送
      - name: Render & send 分时报告到选品群
        if: ${{ false }}
        env:
          LARK_AS_BOT: "1"
        run: |
          sudo apt-get install -y -qq fonts-noto-cjk > /dev/null
          pip install -q matplotlib
          python3 render_report.py fenshi

      # 逐表汇报:全绿静默,有未更新才推送。核心抓取失败=🔴,仅下游表失败=🟡(下次自动补)
      - name: 汇报刷新结果到飞书
        if: always()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          [ -z "$FEISHU_WEBHOOK" ] && exit 0
          ico() { case "$1" in success) echo "✅";; skipped|"") echo "⏭️";; *) echo "❌";; esac; }
          F='${{ steps.fetch.outcome }}'; A='${{ steps.fenshi.outcome }}'; B='${{ steps.sucai.outcome }}'; C='${{ steps.sync.outcome }}'
          if [ "$F" = success ] && [ "$A" = success ] && [ "$B" = success ] && [ "$C" = success ]; then exit 0; fi
          if [ "$F" != success ]; then HEAD="🔴 分时刷新·核心抓取失败"; else HEAD="🟡 分时刷新·部分表未更新(下次自动补)"; fi
          BJT=$(TZ=Asia/Shanghai date '+%m-%d %H:%M')
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TEXT="$HEAD ($BJT)\n$(ico "$F") 分时原表·核心抓取\n$(ico "$A") 分时同步汇总表\n$(ico "$B") 分时素材效果表\n$(ico "$C") 多维表同步\n$URL"
          curl -sS -X POST "$FEISHU_WEBHOOK" -H 'Content-Type: application/json' \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"$TEXT\"}}"
          [ "$F" = success ] || exit 1   # 核心失败才让 workflow 标红;仅下游🟡不标红
