name: Realtime Ad Data (Every 2h)

on:
  schedule:
    # Target: every even UTC hour (00,02,...22) = Beijing 08,10,...06.
    # GitHub delays/drops scheduled runs under load, worst at :00 (global peak).
    # So we avoid :00 entirely and bracket each even hour with two off-peak fires:
    #   :50 of odd hours  → ~10 min before the target (01:50 → before 02:00)
    #   :10 of even hours → ~10 min after  the target (02:10 → after  02:00)
    # The script is a full refresh (idempotent); whichever fire lands persists.
    - cron: '50 1/2 * * *'
    - cron: '10 0/2 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Override date YYYY-MM-DD (default: today per account timezone)'
        required: false

# Serialize runs so overlapping fires don't clear each other mid-refresh.
concurrency:
  group: realtime
  cancel-in-progress: false

jobs:
  realtime:
    name: 每日实时投放数据
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch & refresh realtime data
        env:
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_APP_ID:       ${{ secrets.TIKTOK_APP_ID }}
          TIKTOK_APP_SECRET:   ${{ secrets.TIKTOK_APP_SECRET }}
          TIKTOK_BC_ID:        ${{ secrets.TIKTOK_BC_ID }}
          FEISHU_APP_ID:       ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET:   ${{ secrets.FEISHU_APP_SECRET }}
          TARGET_DATE:         ${{ github.event.inputs.target_date }}
        run: npm run ads-realtime

      - name: Setup lark-cli
        run: |
          npm install -g @larksuite/cli
          echo "${{ secrets.FEISHU_APP_SECRET }}" | lark-cli config init \
            --app-id "${{ secrets.FEISHU_APP_ID }}" \
            --app-secret-stdin \
            --brand feishu

      - name: Rebuild 分时同步数据汇总
        env:
          LARK_AS_BOT: "1"
        run: python3 rebuild_fenshi_summary.py

      - name: Rebuild 分时素材效果表
        env:
          LARK_AS_BOT: "1"
        run: python3 rebuild_sucai_effect.py

      - name: Sync 分时表到多维表
        env:
          LARK_AS_BOT: "1"
        run: python3 sheets_to_base.py fenshi

      - name: Render & send 分时报告到选品群
        env:
          LARK_AS_BOT: "1"
        run: |
          sudo apt-get install -y -qq fonts-noto-cjk > /dev/null
          pip install -q matplotlib
          python3 render_report.py fenshi
