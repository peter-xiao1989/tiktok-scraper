name: Realtime Ad Data (Hourly)

on:
  schedule:
    # Backup only. The Cloudflare worker triggers realtime hourly on the hour
    # (punctual); this is a low-frequency fallback (every 3h at :10) for when
    # the worker is down. Full refresh is idempotent, so an overlapping/missed
    # fire is harmless — this just caps the gap at ~3h without the worker.
    - cron: '10 */3 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Override date YYYY-MM-DD (default: today per account timezone)'
        required: false

# Serialize runs so overlapping fires don't clear each other mid-refresh.
concurrency:
  group: realtime
  cancel-in-progress: false

jobs:
  realtime:
    name: 每日实时投放数据
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch & refresh realtime data
        env:
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_APP_ID:       ${{ secrets.TIKTOK_APP_ID }}
          TIKTOK_APP_SECRET:   ${{ secrets.TIKTOK_APP_SECRET }}
          TIKTOK_BC_ID:        ${{ secrets.TIKTOK_BC_ID }}
          FEISHU_APP_ID:       ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET:   ${{ secrets.FEISHU_APP_SECRET }}
          TARGET_DATE:         ${{ github.event.inputs.target_date }}
        run: npm run ads-realtime

      - name: Setup lark-cli
        run: |
          npm install -g @larksuite/cli
          echo "${{ secrets.FEISHU_APP_SECRET }}" | lark-cli config init \
            --app-id "${{ secrets.FEISHU_APP_ID }}" \
            --app-secret-stdin \
            --brand feishu

      - name: Rebuild 分时同步数据汇总
        env:
          LARK_AS_BOT: "1"
        run: python3 rebuild_fenshi_summary.py

      - name: Rebuild 分时素材效果表
        env:
          LARK_AS_BOT: "1"
        run: python3 rebuild_sucai_effect.py

      - name: Sync 分时表到多维表
        env:
          LARK_AS_BOT: "1"
        run: python3 sheets_to_base.py fenshi

      # 发群暂停(等报告样式优化后恢复):删除下方 if 即恢复发送
      - name: Render & send 分时报告到选品群
        if: ${{ false }}
        env:
          LARK_AS_BOT: "1"
        run: |
          sudo apt-get install -y -qq fonts-noto-cjk > /dev/null
          pip install -q matplotlib
          python3 render_report.py fenshi

      - name: Notify failure to Feishu
        if: failure()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          [ -z "$FEISHU_WEBHOOK" ] && echo "no FEISHU_WEBHOOK configured, skip" && exit 0
          BJT=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "$FEISHU_WEBHOOK" -H 'Content-Type: application/json' \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"❌ 分时数据(每2h)抓取失败\n时间: $BJT BJT\n查看: $URL\"}}"
