name: Realtime Ad Data (Every 2h)

on:
  schedule:
    # Target: every even UTC hour (00,02,...22) = Beijing 08,10,...06.
    # GitHub drops/delays scheduled runs under load, so we fire 3 times per
    # window (:00 :20 :40). The script is a full refresh (idempotent), so extra
    # fires just rewrite the same snapshot — whichever lands closest to the hour wins.
    - cron: '0 */2 * * *'
    - cron: '20 */2 * * *'
    - cron: '40 */2 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Override date YYYY-MM-DD (default: today per account timezone)'
        required: false

# Serialize runs so overlapping fires don't clear each other mid-refresh.
concurrency:
  group: realtime
  cancel-in-progress: false

jobs:
  realtime:
    name: 每日实时投放数据
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Fetch & refresh realtime data
        env:
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_APP_ID:       ${{ secrets.TIKTOK_APP_ID }}
          TIKTOK_APP_SECRET:   ${{ secrets.TIKTOK_APP_SECRET }}
          TIKTOK_BC_ID:        ${{ secrets.TIKTOK_BC_ID }}
          FEISHU_APP_ID:       ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET:   ${{ secrets.FEISHU_APP_SECRET }}
          TARGET_DATE:         ${{ github.event.inputs.target_date }}
        run: npm run ads-realtime
