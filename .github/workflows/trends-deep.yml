name: 内容热榜·登录深抓(手动验证)

on:
  workflow_dispatch:
    inputs:
      regions:
        description: '地区 (默认 US)'
        required: false
      topn:
        description: '每榜目标条数 (默认 100)'
        required: false

concurrency:
  group: trends-deep
  cancel-in-progress: false

jobs:
  deep:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: 登录深抓(验证 View More 能否解锁 100/榜)
        env:
          WB_BASE:        ${{ secrets.WB_BASE || 'https://tt-ads-workbench.xiaohuipeng123.workers.dev' }}
          WB_SETUP_KEY:   ${{ secrets.WB_SETUP_KEY }}
          CC_COOKIES:     ${{ secrets.TIKTOK_COOKIES }}
          ADS_EMAIL:      ${{ secrets.ADS_EMAIL || 'peter@kuaiql.com' }}
          ADS_PASSWORD:   ${{ secrets.ADS_PASSWORD }}
          TIKTOK_EMAIL:   ${{ secrets.TIKTOK_EMAIL }}
          TIKTOK_PASSWORD: ${{ secrets.TIKTOK_PASSWORD }}
          EMAIL_163_PASS: ${{ secrets.EMAIL_163_PASS }}
          TR_LOGIN:       '1'
          TR_REGIONS:     ${{ github.event.inputs.regions || 'US' }}
          TR_PERIODS:     '7'
          TR_ORDERS:      'for_you'
          TR_TOPN:        ${{ github.event.inputs.topn || '100' }}
        run: xvfb-run -a node src/trends-scrape.js
      - name: 上传登录截图(排错)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cc-login-shots
          path: data/cc-login-*.png
          if-no-files-found: ignore
