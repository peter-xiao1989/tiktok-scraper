name: APP Daily (GA4, 16:23 BJT)

on:
  schedule:
    # GA4 daily data settles within ~24h; full-refresh each run self-heals any gap.
    - cron: '23 8 * * *'    # 16:23 BJT
    - cron: '53 8 * * *'    # 16:53 BJT (backup; idempotent full refresh)
  workflow_dispatch:

concurrency:
  group: app-daily
  cancel-in-progress: false

jobs:
  app-ga4:
    name: APP线 GA4 → APP经营数据中心
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Fetch GA4 → KQL 经分后台 D1(app_daily)
        env:
          GA4_SA_JSON:   ${{ secrets.GA4_SA_JSON }}
          ANALYTICS_URL: ${{ secrets.ANALYTICS_URL }}
          EXPORT_TOKEN:  ${{ secrets.EXPORT_TOKEN }}
        run: node src/apps/fetch-ga4-d1.js

      # 旧飞书多维表同步:配额死时失败不拖垮 workflow(APP 数据已进分析台 D1),避免误报
      - name: Fetch GA4 → sync bitable
        if: always()
        continue-on-error: true
        env:
          GA4_SA_JSON:       ${{ secrets.GA4_SA_JSON }}
          FEISHU_APP_ID:     ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: npm run app-ga4

      - name: Notify failure to Feishu
        if: failure() || cancelled()
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          [ -z "$FEISHU_WEBHOOK" ] && echo "no FEISHU_WEBHOOK configured, skip" && exit 0
          BJT=$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sS -X POST "$FEISHU_WEBHOOK" -H 'Content-Type: application/json' \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"🔴 APP线·GA4 数据同步失败 ($BJT BJT)\n$URL\"}}"
