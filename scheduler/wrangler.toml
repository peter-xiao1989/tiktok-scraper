name = "tiktok-scraper-scheduler"
main = "worker.js"
compatibility_date = "2024-12-01"

# Single cron (free plan caps total triggers per account). Fires at both hours:
#   08:00 UTC = 16:00 BJT → daily-product.yml
#   23:00 UTC = 07:00 BJT → daily-ads.yml
# The worker routes by the fired hour (see worker.js).
[triggers]
crons = ["0 8,23 * * *"]

[vars]
REPO = "peter-xiao1989/tiktok-scraper"

# Secrets (do NOT put here — set with `wrangler secret put`):
#   wrangler secret put GH_PAT
#   wrangler secret put FEISHU_WEBHOOK
